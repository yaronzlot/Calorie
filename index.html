<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סורק קלוריות AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d4af37;
      --gold-dim: #b8941a;
      --bg: #0a0a0a;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(212,175,55,0.18);
      --text: #f0ede6;
      --muted: #666;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      background: radial-gradient(ellipse at 65% 15%, rgba(212,175,55,0.07) 0%, transparent 55%),
                  radial-gradient(ellipse at 20% 85%, rgba(180,140,30,0.04) 0%, transparent 40%),
                  var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header-tag {
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 0.6rem;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 1.1;
    }
    .header h1 span { color: var(--gold); }
    .header p {
      margin-top: 0.65rem;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Camera Frame ── */
    .camera-wrap { width: 100%; max-width: 480px; }

    .camera-frame {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #111;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(212,175,55,0.07), 0 24px 64px rgba(0,0,0,0.55);
    }

    .camera-frame video,
    .camera-frame img#preview {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .idle-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      color: #3a3a3a;
    }
    .idle-icon {
      width: 64px; height: 64px;
      border: 2px dashed #2a2a2a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }
    .idle-placeholder p { font-size: 0.82rem; color: #3a3a3a; }

    /* corner decorations */
    .corners { position: absolute; inset: 0; pointer-events: none; }
    .c { position: absolute; width: 22px; height: 22px; border-color: var(--gold); border-style: solid; opacity: 0.65; }
    .c-tl { top:14px; left:14px;  border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
    .c-tr { top:14px; right:14px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
    .c-bl { bottom:14px; left:14px;  border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
    .c-br { bottom:14px; right:14px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

    .frame-label {
      position: absolute; top:12px; left:12px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px);
      padding: 0.28rem 0.7rem;
      border-radius: 50px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(212,175,55,0.28);
      display: none;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 0.9rem;
      margin-top: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.72rem 1.6rem;
      border: none; border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 500;
      cursor: pointer;
      transition: transform .22s, box-shadow .22s, background .22s;
      display: flex; align-items: center; gap: 0.45rem;
      letter-spacing: 0.02em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #0a0a0a;
      box-shadow: 0 4px 20px rgba(212,175,55,0.28);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(212,175,55,0.42);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #999;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.11); color: var(--text); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }

    .upload-hint {
      margin-top: 0.8rem; text-align: center;
    }
    .upload-hint label {
      font-size: 0.78rem; color: #484848;
      cursor: pointer; transition: color .2s;
      display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .upload-hint label:hover { color: var(--gold); }
    input[type="file"] { display: none; }

    /* ── Analyzing spinner ── */
    .analyzing-card {
      width: 100%; max-width: 480px;
      margin-top: 1.8rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      padding: 2rem;
      color: #555; font-size: 0.85rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(212,175,55,0.14);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result Card ── */
    .result-card {
      width: 100%; max-width: 480px;
      margin-top: 1.8rem;
      animation: slideUp .4s ease;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .result-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      backdrop-filter: blur(10px);
    }

    .result-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem;
      padding-bottom: 1.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 1.25rem;
    }
    .dish-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem; color: var(--text); line-height: 1.2;
    }
    .dish-desc {
      margin-top: 0.4rem;
      font-size: 0.8rem; color: #5a5a5a;
      line-height: 1.55; font-weight: 300;
    }
    .cal-badge {
      flex-shrink: 0; text-align: center;
      background: linear-gradient(135deg, rgba(212,175,55,0.14), rgba(212,175,55,0.04));
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 12px; padding: 0.7rem 1rem; min-width: 78px;
    }
    .cal-number {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; color: var(--gold); line-height: 1;
    }
    .cal-label {
      font-size: 0.62rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: #777; margin-top: 0.2rem;
    }

    .confidence-row {
      display: flex; align-items: center; gap: 0.55rem; margin-bottom: 1.2rem;
    }
    .conf-bar {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
    }
    .conf-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-dim));
      border-radius: 2px; transition: width 1s ease;
    }
    .conf-text { font-size: 0.7rem; color: #484848; white-space: nowrap; }

    .macros {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 0.7rem; margin-bottom: 1.2rem;
    }
    .macro {
      text-align: center; padding: 0.7rem 0.4rem;
      background: rgba(255,255,255,0.03);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);
    }
    .macro-val { font-size: 1.05rem; font-weight: 500; color: var(--text); }
    .macro-lbl { font-size: 0.68rem; color: #4a4a4a; margin-top: 0.18rem; letter-spacing: 0.04em; }

    .health-note {
      font-size: 0.79rem; color: #585858;
      line-height: 1.6; font-style: italic;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* ── Error ── */
    .error-box {
      width: 100%; max-width: 480px;
      margin-top: 1.2rem;
      background: rgba(220,50,50,0.08);
      border: 1px solid rgba(220,50,50,0.22);
      border-radius: 12px; padding: 1rem 1.25rem;
      color: #d97070; font-size: 0.84rem;
    }

    /* hidden helpers */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-tag">AI · Nutrition · Analysis</div>
    <h1>סורק <span>קלוריות</span></h1>
    <p>צלם מנה וקבל מידע תזונתי מיידי</p>
  </div>

  <!-- Camera wrapper -->
  <div class="camera-wrap">
    <div class="camera-frame">

      <!-- idle state -->
      <div id="idlePlaceholder" class="idle-placeholder">
        <div class="idle-icon">📷</div>
        <p>לחץ על "פתח מצלמה" להתחלה</p>
      </div>

      <!-- live video -->
      <video id="video" autoplay playsinline muted class="hidden"></video>

      <!-- captured preview -->
      <img id="preview" class="hidden" alt="captured food" />
      <div id="frameLabel" class="frame-label">תמונה צולמה</div>

      <!-- corner decorations (show when camera/preview active) -->
      <div class="corners hidden" id="corners">
        <div class="c c-tl"></div><div class="c c-tr"></div>
        <div class="c c-bl"></div><div class="c c-br"></div>
      </div>
    </div>

    <!-- hidden canvas for capture -->
    <canvas id="canvas" class="hidden"></canvas>

    <!-- Buttons -->
    <div class="controls" id="controls">
      <!-- state: idle -->
      <button class="btn btn-primary" id="btnOpenCamera">📷 פתח מצלמה</button>

      <!-- state: camera (hidden initially) -->
      <button class="btn btn-primary hidden" id="btnCapture">⚡ צלם עכשיו</button>
      <button class="btn btn-secondary hidden" id="btnCancelCamera">✕ בטל</button>

      <!-- state: captured (hidden initially) -->
      <button class="btn btn-primary hidden" id="btnAnalyze">🔍 נתח קלוריות</button>
      <button class="btn btn-secondary hidden" id="btnReset">↩ מחדש</button>
    </div>

    <div class="upload-hint" id="uploadHint">
      <label>
        <input type="file" id="fileInput" accept="image/*" />
        📁 או העלה תמונה מהגלריה
      </label>
    </div>
  </div>

  <!-- Analyzing indicator -->
  <div id="analyzingCard" class="analyzing-card hidden">
    <div class="spinner"></div>
    <span>מנתח את המנה שלך...</span>
  </div>

  <!-- Error box -->
  <div id="errorBox" class="error-box hidden"></div>

  <!-- Result card -->
  <div id="resultCard" class="result-card hidden">
    <div class="result-inner">
      <div class="result-top">
        <div>
          <div class="dish-name" id="rDishName"></div>
          <div class="dish-desc" id="rDishDesc"></div>
        </div>
        <div class="cal-badge">
          <div class="cal-number" id="rCalories"></div>
          <div class="cal-label">קלוריות</div>
        </div>
      </div>

      <div class="confidence-row" id="confRow">
        <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
        <span class="conf-text" id="confText"></span>
      </div>

      <div class="macros">
        <div class="macro"><div class="macro-val" id="rProtein"></div><div class="macro-lbl">חלבון</div></div>
        <div class="macro"><div class="macro-val" id="rCarbs"></div><div class="macro-lbl">פחמימות</div></div>
        <div class="macro"><div class="macro-val" id="rFat"></div><div class="macro-lbl">שומן</div></div>
      </div>

      <div class="health-note" id="rHealthNote"></div>
    </div>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────────
  let stream = null;
  let capturedDataUrl = null;

  // ── Element refs ───────────────────────────────────────
  const video        = document.getElementById('video');
  const canvas       = document.getElementById('canvas');
  const preview      = document.getElementById('preview');
  const idleEl       = document.getElementById('idlePlaceholder');
  const frameLabel   = document.getElementById('frameLabel');
  const corners      = document.getElementById('corners');
  const fileInput    = document.getElementById('fileInput');
  const uploadHint   = document.getElementById('uploadHint');
  const analyzingCard= document.getElementById('analyzingCard');
  const errorBox     = document.getElementById('errorBox');
  const resultCard   = document.getElementById('resultCard');

  const btnOpenCamera   = document.getElementById('btnOpenCamera');
  const btnCapture      = document.getElementById('btnCapture');
  const btnCancelCamera = document.getElementById('btnCancelCamera');
  const btnAnalyze      = document.getElementById('btnAnalyze');
  const btnReset        = document.getElementById('btnReset');

  // ── UI helpers ─────────────────────────────────────────
  function show(...els) { els.forEach(e => e.classList.remove('hidden')); }
  function hide(...els) { els.forEach(e => e.classList.add('hidden')); }

  function setState(state) {
    // reset everything
    hide(idleEl, video, preview, frameLabel, corners, analyzingCard, errorBox, resultCard, uploadHint,
         btnOpenCamera, btnCapture, btnCancelCamera, btnAnalyze, btnReset);

    if (state === 'idle') {
      show(idleEl, btnOpenCamera, uploadHint);
    } else if (state === 'camera') {
      show(video, corners, btnCapture, btnCancelCamera, uploadHint);
    } else if (state === 'captured') {
      show(preview, frameLabel, corners, btnAnalyze, btnReset, uploadHint);
    } else if (state === 'analyzing') {
      show(preview, frameLabel, corners, analyzingCard);
    }
  }

  function showError(msg) {
    errorBox.textContent = '⚠️ ' + msg;
    show(errorBox);
  }

  // ── Camera ─────────────────────────────────────────────
  async function openCamera() {
    errorBox.textContent = '';
    hide(errorBox, resultCard);
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
      });
      video.srcObject = stream;
      await video.play();
      setState('camera');
    } catch {
      showError('לא ניתן לגשת למצלמה. נסה להעלות תמונה.');
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  function capturePhoto() {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedDataUrl = canvas.toDataURL('image/jpeg', 0.85);
    preview.src = capturedDataUrl;
    stopCamera();
    setState('captured');
  }

  function reset() {
    stopCamera();
    capturedDataUrl = null;
    preview.src = '';
    hide(resultCard, errorBox);
    setState('idle');
  }

  // ── File upload ────────────────────────────────────────
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    hide(errorBox, resultCard);
    const reader = new FileReader();
    reader.onload = (ev) => {
      capturedDataUrl = ev.target.result;
      preview.src = capturedDataUrl;
      stopCamera();
      setState('captured');
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  // ── Analyze ────────────────────────────────────────────
  const SYSTEM_PROMPT = `You are a food recognition and nutrition expert. When given an image of food, analyze it and respond ONLY with a valid JSON object (no markdown, no extra text) in this exact format:
{
  "dish": "Name of the dish",
  "description": "Brief 1-2 sentence description of the dish",
  "calories": 450,
  "protein": "28g",
  "carbs": "42g",
  "fat": "14g",
  "confidence": 88,
  "healthNote": "One brief health insight about this meal"
}
The calories should be a number (integer). Confidence is 0-100. Be realistic with estimates. If you cannot identify a food item, return: {"error": "Could not identify food in image"}`;

  async function analyzeFood() {
    if (!capturedDataUrl) return;
    setState('analyzing');
    hide(errorBox, resultCard);

    try {
      const base64    = capturedDataUrl.split(',')[1];
      const mediaType = capturedDataUrl.startsWith('data:image/png') ? 'image/png' : 'image/jpeg';

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
              { type: 'text',  text: 'What food is in this image? Provide nutrition estimates.' }
            ]
          }]
        })
      });

      const data   = await response.json();
      const text   = (data.content || []).map(b => b.text || '').join('').trim();
      const clean  = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      if (parsed.error) {
        setState('captured');
        showError(parsed.error);
        return;
      }

      renderResult(parsed);
      setState('captured');
    } catch (err) {
      setState('captured');
      showError('שגיאה בניתוח התמונה. נסה שוב.');
      console.error(err);
    }
  }

  function renderResult(r) {
    document.getElementById('rDishName').textContent  = r.dish        || '';
    document.getElementById('rDishDesc').textContent  = r.description || '';
    document.getElementById('rCalories').textContent  = r.calories    || '—';
    document.getElementById('rProtein').textContent   = r.protein     || '—';
    document.getElementById('rCarbs').textContent     = r.carbs       || '—';
    document.getElementById('rFat').textContent       = r.fat         || '—';
    document.getElementById('rHealthNote').textContent= r.healthNote ? '💡 ' + r.healthNote : '';

    if (r.confidence) {
      document.getElementById('confFill').style.width = r.confidence + '%';
      document.getElementById('confText').textContent  = 'דיוק ' + r.confidence + '%';
      show(document.getElementById('confRow'));
    } else {
      hide(document.getElementById('confRow'));
    }

    show(resultCard);
    setTimeout(() => {
      document.getElementById('confFill').style.width = (r.confidence || 0) + '%';
    }, 50);
  }

  // ── Button listeners ───────────────────────────────────
  btnOpenCamera.addEventListener('click',   openCamera);
  btnCapture.addEventListener('click',      capturePhoto);
  btnCancelCamera.addEventListener('click', reset);
  btnAnalyze.addEventListener('click',      analyzeFood);
  btnReset.addEventListener('click',        reset);

  // ── Init ───────────────────────────────────────────────
  setState('idle');
</script>
</body>
</html>
