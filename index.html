<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סורק קלוריות AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #d4af37; --gold-dim: #b8941a; --bg: #0a0a0a;
      --surface: rgba(255,255,255,0.03); --border: rgba(212,175,55,0.18);
      --text: #f0ede6; --muted: #666;
    }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }
    .app {
      min-height: 100vh;
      background: radial-gradient(ellipse at 65% 15%, rgba(212,175,55,0.07) 0%, transparent 55%),
                  radial-gradient(ellipse at 20% 85%, rgba(180,140,30,0.04) 0%, transparent 40%), var(--bg);
      display: flex; flex-direction: column; align-items: center; padding: 2.5rem 1rem 4rem;
    }
    .header { text-align: center; margin-bottom: 2rem; }
    .header-tag { font-size: .68rem; letter-spacing: .28em; text-transform: uppercase; color: var(--gold); opacity: .75; margin-bottom: .6rem; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem,7vw,3rem); line-height: 1.1; }
    .header h1 span { color: var(--gold); }
    .header p { margin-top: .65rem; font-size: .88rem; color: var(--muted); font-weight: 300; }

    /* API Key */
    .apikey-wrap {
      width: 100%; max-width: 480px; margin-bottom: 1.5rem;
      background: rgba(212,175,55,0.05); border: 1px solid rgba(212,175,55,0.2);
      border-radius: 14px; padding: 1.1rem 1.25rem; transition: border-color .3s, background .3s;
    }
    .apikey-wrap.saved { background: rgba(60,180,80,0.06); border-color: rgba(60,180,80,0.25); }
    .apikey-label { display: block; font-size: .78rem; color: var(--gold); margin-bottom: .6rem; letter-spacing: .04em; }
    .apikey-wrap.saved .apikey-label { color: #5cb870; }
    .apikey-row { display: flex; gap: .6rem; }
    .apikey-row input {
      flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: .6rem .9rem; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .85rem; outline: none; transition: border-color .2s;
    }
    .apikey-row input:focus { border-color: rgba(212,175,55,0.4); }
    .apikey-hint { margin-top: .55rem; font-size: .72rem; color: #4a4a4a; line-height: 1.5; }
    .apikey-hint a { color: #888; }
    .apikey-hint a:hover { color: var(--gold); }
    .free-badge {
      display: inline-block; background: rgba(60,180,80,0.15); border: 1px solid rgba(60,180,80,0.3);
      color: #5cb870; border-radius: 20px; padding: .15rem .55rem; font-size: .68rem;
      letter-spacing: .05em; margin-right: .4rem; vertical-align: middle;
    }

    /* Camera */
    .camera-wrap { width: 100%; max-width: 480px; }
    .camera-frame {
      width: 100%; aspect-ratio: 4/3; border-radius: 16px; overflow: hidden;
      position: relative; background: #111; border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(212,175,55,0.07), 0 24px 64px rgba(0,0,0,0.55);
    }
    .camera-frame video, .camera-frame img#preview { width: 100%; height: 100%; object-fit: cover; display: block; }
    .idle-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 1rem; }
    .idle-icon { width: 64px; height: 64px; border: 2px dashed #2a2a2a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
    .idle-placeholder p { font-size: .82rem; color: #3a3a3a; }
    .corners { position: absolute; inset: 0; pointer-events: none; }
    .c { position: absolute; width: 22px; height: 22px; border-color: var(--gold); border-style: solid; opacity: .65; }
    .c-tl { top:14px; left:14px;  border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
    .c-tr { top:14px; right:14px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
    .c-bl { bottom:14px; left:14px;  border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
    .c-br { bottom:14px; right:14px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }
    .frame-label {
      position: absolute; top:12px; left:12px; background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px); padding: .28rem .7rem; border-radius: 50px;
      font-size: .7rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--gold); border: 1px solid rgba(212,175,55,0.28); display: none;
    }
    .controls { display: flex; gap: .9rem; margin-top: 1.2rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: .72rem 1.6rem; border: none; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 500;
      cursor: pointer; transition: transform .22s, box-shadow .22s;
      display: flex; align-items: center; gap: .45rem; letter-spacing: .02em;
    }
    .btn-sm { padding: .58rem 1rem !important; font-size: .8rem !important; }
    .btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-dim)); color: #0a0a0a; box-shadow: 0 4px 20px rgba(212,175,55,0.28); }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,175,55,0.42); }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #999; border: 1px solid rgba(255,255,255,0.1); }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.11); color: var(--text); }
    .btn:disabled { opacity: .38; cursor: not-allowed; }
    .upload-hint { margin-top: .8rem; text-align: center; }
    .upload-hint label { font-size: .78rem; color: #484848; cursor: pointer; transition: color .2s; display: inline-flex; align-items: center; gap: .35rem; }
    .upload-hint label:hover { color: var(--gold); }
    input[type="file"] { display: none; }

    .analyzing-card { width: 100%; max-width: 480px; margin-top: 1.8rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 2rem; color: #555; font-size: .85rem; }
    .spinner { width: 36px; height: 36px; border: 2px solid rgba(212,175,55,0.14); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card { width: 100%; max-width: 480px; margin-top: 1.8rem; animation: slideUp .4s ease; }
    @keyframes slideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .result-inner { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; backdrop-filter: blur(10px); }
    .result-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; padding-bottom: 1.4rem; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 1.25rem; }
    .dish-name { font-family: 'Playfair Display', serif; font-size: 1.45rem; color: var(--text); line-height: 1.2; }
    .dish-desc { margin-top: .4rem; font-size: .8rem; color: #5a5a5a; line-height: 1.55; font-weight: 300; }
    .cal-badge { flex-shrink: 0; text-align: center; background: linear-gradient(135deg, rgba(212,175,55,0.14), rgba(212,175,55,0.04)); border: 1px solid rgba(212,175,55,0.3); border-radius: 12px; padding: .7rem 1rem; min-width: 78px; }
    .cal-number { font-family: 'Playfair Display', serif; font-size: 1.75rem; color: var(--gold); line-height: 1; }
    .cal-label { font-size: .62rem; letter-spacing: .15em; text-transform: uppercase; color: #777; margin-top: .2rem; }
    .confidence-row { display: flex; align-items: center; gap: .55rem; margin-bottom: 1.2rem; }
    .conf-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .conf-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-dim)); border-radius: 2px; transition: width 1s ease; }
    .conf-text { font-size: .7rem; color: #484848; white-space: nowrap; }
    .macros { display: grid; grid-template-columns: repeat(3,1fr); gap: .7rem; margin-bottom: 1.2rem; }
    .macro { text-align: center; padding: .7rem .4rem; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
    .macro-val { font-size: 1.05rem; font-weight: 500; color: var(--text); }
    .macro-lbl { font-size: .68rem; color: #4a4a4a; margin-top: .18rem; letter-spacing: .04em; }
    .health-note { font-size: .79rem; color: #585858; line-height: 1.6; font-style: italic; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); }
    .error-box { width: 100%; max-width: 480px; margin-top: 1.2rem; background: rgba(220,50,50,0.08); border: 1px solid rgba(220,50,50,0.22); border-radius: 12px; padding: 1rem 1.25rem; color: #d97070; font-size: .84rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-tag">AI &middot; Nutrition &middot; Analysis</div>
    <h1>סורק <span>קלוריות</span></h1>
    <p>צלם מנה וקבל מידע תזונתי מיידי</p>
  </div>

  <!-- API Key -->
  <div class="apikey-wrap" id="apikeyWrap">
    <label class="apikey-label" id="apikeyLabel">🔑 Google Gemini API Key <span class="free-badge">חינם</span></label>
    <div class="apikey-row">
      <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off" spellcheck="false" />
      <button class="btn btn-primary btn-sm" id="btnSaveKey">שמור</button>
    </div>
    <p class="apikey-hint">
      המפתח נשמר רק בדפדפן שלך.
      <a href="https://aistudio.google.com/app/apikey" target="_blank">קבל מפתח חינמי מ-Google AI Studio</a>
    </p>
  </div>

  <!-- Camera -->
  <div class="camera-wrap">
    <div class="camera-frame">
      <div id="idlePlaceholder" class="idle-placeholder">
        <div class="idle-icon">📷</div>
        <p>לחץ על "פתח מצלמה" להתחלה</p>
      </div>
      <video id="video" autoplay playsinline muted class="hidden"></video>
      <img id="preview" class="hidden" alt="captured food" />
      <div id="frameLabel" class="frame-label">תמונה צולמה</div>
      <div class="corners hidden" id="corners">
        <div class="c c-tl"></div><div class="c c-tr"></div>
        <div class="c c-bl"></div><div class="c c-br"></div>
      </div>
    </div>
    <canvas id="canvas" class="hidden"></canvas>
    <div class="controls">
      <button class="btn btn-primary" id="btnOpenCamera">📷 פתח מצלמה</button>
      <button class="btn btn-primary hidden" id="btnCapture">⚡ צלם עכשיו</button>
      <button class="btn btn-secondary hidden" id="btnCancelCamera">✕ בטל</button>
      <button class="btn btn-primary hidden" id="btnAnalyze">🔍 נתח קלוריות</button>
      <button class="btn btn-secondary hidden" id="btnReset">↩ מחדש</button>
    </div>
    <div class="upload-hint" id="uploadHint">
      <label>
        <input type="file" id="fileInput" accept="image/*" />
        📁 או העלה תמונה מהגלריה
      </label>
    </div>
  </div>

  <div id="analyzingCard" class="analyzing-card hidden">
    <div class="spinner"></div>
    <span>מנתח את המנה שלך...</span>
  </div>

  <div id="errorBox" class="error-box hidden"></div>

  <div id="resultCard" class="result-card hidden">
    <div class="result-inner">
      <div class="result-top">
        <div>
          <div class="dish-name" id="rDishName"></div>
          <div class="dish-desc" id="rDishDesc"></div>
        </div>
        <div class="cal-badge">
          <div class="cal-number" id="rCalories"></div>
          <div class="cal-label">קלוריות</div>
        </div>
      </div>
      <div class="confidence-row" id="confRow">
        <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
        <span class="conf-text" id="confText"></span>
      </div>
      <div class="macros">
        <div class="macro"><div class="macro-val" id="rProtein"></div><div class="macro-lbl">חלבון</div></div>
        <div class="macro"><div class="macro-val" id="rCarbs"></div><div class="macro-lbl">פחמימות</div></div>
        <div class="macro"><div class="macro-val" id="rFat"></div><div class="macro-lbl">שומן</div></div>
      </div>
      <div class="health-note" id="rHealthNote"></div>
    </div>
  </div>

</div>
<script>
  var stream = null;
  var capturedDataUrl = null;

  var video         = document.getElementById('video');
  var canvas        = document.getElementById('canvas');
  var preview       = document.getElementById('preview');
  var idleEl        = document.getElementById('idlePlaceholder');
  var frameLabel    = document.getElementById('frameLabel');
  var corners       = document.getElementById('corners');
  var fileInput     = document.getElementById('fileInput');
  var uploadHint    = document.getElementById('uploadHint');
  var analyzingCard = document.getElementById('analyzingCard');
  var errorBox      = document.getElementById('errorBox');
  var resultCard    = document.getElementById('resultCard');
  var btnOpenCamera   = document.getElementById('btnOpenCamera');
  var btnCapture      = document.getElementById('btnCapture');
  var btnCancelCamera = document.getElementById('btnCancelCamera');
  var btnAnalyze      = document.getElementById('btnAnalyze');
  var btnReset        = document.getElementById('btnReset');
  var apiKeyInput     = document.getElementById('apiKeyInput');
  var btnSaveKey      = document.getElementById('btnSaveKey');
  var apikeyWrap      = document.getElementById('apikeyWrap');
  var apikeyLabel     = document.getElementById('apikeyLabel');

  // Load saved key on startup
  var savedKey = localStorage.getItem('gemini_api_key');
  if (savedKey) {
    apiKeyInput.value = savedKey;
    markKeySaved();
  }

  function markKeySaved() {
    apikeyWrap.classList.add('saved');
    apikeyLabel.innerHTML = '✅ Gemini API Key שמור <span class="free-badge">חינם</span>';
  }

  btnSaveKey.addEventListener('click', function() {
    var key = apiKeyInput.value.trim();
    if (!key || key.length < 10) {
      alert('מפתח לא תקין — צריך להתחיל עם AIza...');
      return;
    }
    localStorage.setItem('gemini_api_key', key);
    markKeySaved();
  });

  function show() {
    for (var i = 0; i < arguments.length; i++) arguments[i].classList.remove('hidden');
  }
  function hide() {
    for (var i = 0; i < arguments.length; i++) arguments[i].classList.add('hidden');
  }

  function setState(state) {
    hide(idleEl, video, preview, frameLabel, corners, analyzingCard, errorBox, resultCard, uploadHint,
         btnOpenCamera, btnCapture, btnCancelCamera, btnAnalyze, btnReset);
    if (state === 'idle') {
      show(idleEl, btnOpenCamera, uploadHint);
    } else if (state === 'camera') {
      show(video, corners, btnCapture, btnCancelCamera, uploadHint);
    } else if (state === 'captured') {
      show(preview, frameLabel, corners, btnAnalyze, btnReset, uploadHint);
    } else if (state === 'analyzing') {
      show(preview, frameLabel, corners, analyzingCard);
    }
  }

  function showError(msg) {
    errorBox.textContent = '⚠ ' + msg;
    show(errorBox);
  }

  function openCamera() {
    errorBox.textContent = '';
    hide(errorBox, resultCard);
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
    }).then(function(s) {
      stream = s;
      video.srcObject = stream;
      video.play();
      setState('camera');
    }).catch(function() {
      showError('לא ניתן לגשת למצלמה. נסה להעלות תמונה.');
    });
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
  }

  function capturePhoto() {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedDataUrl = canvas.toDataURL('image/jpeg', 0.85);
    preview.src = capturedDataUrl;
    stopCamera();
    setState('captured');
  }

  function reset() {
    stopCamera();
    capturedDataUrl = null;
    preview.src = '';
    hide(resultCard, errorBox);
    setState('idle');
  }

  fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    hide(errorBox, resultCard);
    var reader = new FileReader();
    reader.onload = function(ev) {
      capturedDataUrl = ev.target.result;
      preview.src = capturedDataUrl;
      stopCamera();
      setState('captured');
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  var PROMPT = 'You are a food recognition and nutrition expert. Analyze the food in this image and respond ONLY with a valid JSON object (no markdown, no extra text) in this exact format: {"dish":"Name of dish","description":"Brief 1-2 sentence description","calories":450,"protein":"28g","carbs":"42g","fat":"14g","confidence":88,"healthNote":"One brief health insight"}. calories must be an integer. confidence is 0-100. If you cannot identify food return: {"error":"Could not identify food in image"}';

  function analyzeFood() {
    if (!capturedDataUrl) return;

    var apiKey = localStorage.getItem('gemini_api_key') || '';
    if (!apiKey) {
      showError('נא להזין ולשמור את ה-Gemini API Key תחילה.');
      return;
    }

    setState('analyzing');
    hide(errorBox, resultCard);

    var base64    = capturedDataUrl.split(',')[1];
    var mediaType = capturedDataUrl.startsWith('data:image/png') ? 'image/png' : 'image/jpeg';

    // Gemini 1.5 Flash — free tier
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + apiKey;

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: PROMPT },
            { inline_data: { mime_type: mediaType, data: base64 } }
          ]
        }],
        generationConfig: { temperature: 0.2, maxOutputTokens: 512 }
      })
    })
    .then(function(response) {
      if (!response.ok) {
        return response.json().then(function(err) {
          throw new Error((err.error && err.error.message) || 'שגיאת API ' + response.status);
        });
      }
      return response.json();
    })
    .then(function(data) {
      var text = '';
      try {
        text = data.candidates[0].content.parts[0].text.trim();
      } catch(e) {
        throw new Error('תגובה לא תקינה מ-Gemini');
      }
      var clean = text.replace(/```json|```/g, '').trim();
      var parsed = JSON.parse(clean);
      if (parsed.error) {
        setState('captured');
        showError(parsed.error);
        return;
      }
      renderResult(parsed);
      setState('captured');
    })
    .catch(function(err) {
      setState('captured');
      showError(err.message || 'שגיאה בניתוח התמונה. נסה שוב.');
      console.error(err);
    });
  }

  function renderResult(r) {
    document.getElementById('rDishName').textContent  = r.dish        || '';
    document.getElementById('rDishDesc').textContent  = r.description || '';
    document.getElementById('rCalories').textContent  = r.calories    || '—';
    document.getElementById('rProtein').textContent   = r.protein     || '—';
    document.getElementById('rCarbs').textContent     = r.carbs       || '—';
    document.getElementById('rFat').textContent       = r.fat         || '—';
    document.getElementById('rHealthNote').textContent = r.healthNote ? '💡 ' + r.healthNote : '';

    var confRow  = document.getElementById('confRow');
    var confFill = document.getElementById('confFill');
    var confText = document.getElementById('confText');
    if (r.confidence) {
      confFill.style.width = '0%';
      confText.textContent = 'דיוק ' + r.confidence + '%';
      show(confRow);
      setTimeout(function() { confFill.style.width = r.confidence + '%'; }, 80);
    } else {
      hide(confRow);
    }
    show(resultCard);
  }

  btnOpenCamera.addEventListener('click', openCamera);
  btnCapture.addEventListener('click', capturePhoto);
  btnCancelCamera.addEventListener('click', reset);
  btnAnalyze.addEventListener('click', analyzeFood);
  btnReset.addEventListener('click', reset);

  setState('idle');
</script>
</body>
</html>
